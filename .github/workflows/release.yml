name: Release

on:
  push:
    branches:
      - master

jobs:
  # Gate: publishing must not happen unless typecheck/test/lint/build pass.
  # Reuses the same checks the CI workflow runs on pull requests.
  verify:
    name: Verify
    uses: ./.github/workflows/ci.yml

  release:
    name: Release
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PNPM
        # Version is read from the root package.json "packageManager" field.
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Release PR or Publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        uses: changesets/action@v1
        with:
          publish: pnpm ci:publish
          # The following ensures the PR created can't be merged
          # until it passes the test workflow
          title: "chore: version packages"
          commit: "chore: version packages"
