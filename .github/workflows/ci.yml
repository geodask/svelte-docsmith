name: CI

on:
  pull_request:
  push:
    branches:
      - master
  # Allow the release workflow to run these checks as a gate before publishing.
  workflow_call:

# Cancel superseded runs on the same ref (PR pushes), but never cancel on master.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    name: Typecheck, test, lint, build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        # Version is read from the root package.json "packageManager" field.
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Vite 7+ (Milestone 2) requires Node >= 20.19; pin ahead of it now.
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (with coverage gate)
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

      # Pack the publishable tarball so a reviewer can install exactly what
      # would ship to npm and run the README adoption steps against it.
      - name: Pack the library tarball
        working-directory: packages/svelte-docsmith
        run: pnpm pack --pack-destination "$RUNNER_TEMP"

      - name: Upload the library tarball
        uses: actions/upload-artifact@v4
        with:
          name: svelte-docsmith-tarball
          path: ${{ runner.temp }}/*.tgz
          if-no-files-found: error
