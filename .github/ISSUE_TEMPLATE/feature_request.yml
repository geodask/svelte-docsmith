name: Feature request
description: Suggest an idea or improvement for svelte-docsmith
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. For open-ended "what do people think" proposals, a Discussion may be a better fit. Please search existing issues and discussions first.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What are you trying to do that's currently hard or impossible? Describe the use case, not just the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? An API sketch, a config option, a component shape, etc.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you've tried or thought about.
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and discussions for a similar request
          required: true
